name: flowledger
description: "FlowLedger - Track all your income streams, understand your expenses, and detect money leaks automatically."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  lucide_icons: ^0.257.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  csv: ^6.0.0

  # Date Picker
  calendar_date_picker2: ^1.1.8

  # Charts
  fl_chart: ^0.69.2

  # Animations
  flutter_animate: ^4.5.0

  # Marquee text
  marquee: ^2.2.3

  # Navigation
  go_router: ^14.6.2

  # Biometric Authentication
  local_auth: ^2.3.0

  # Receipt Scanning
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  file_picker: ^8.1.6
  pdfx: ^2.6.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^3.0.1

  # Google Drive Integration (for receipt cloud storage)
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  googleapis_auth: ^1.6.0
  http: ^1.2.0

  # Export Reports (PDF & CSV)
  pdf: ^3.11.1
  printing: ^5.13.3
  share_plus: ^10.1.3
  open_file: ^3.5.10

  # Permissions
  permission_handler: ^11.3.1

  # Cloud Sync (Supabase)
  supabase_flutter: ^2.8.3

  # Deep Links
  app_links: ^6.3.3

  # In-App Purchases (RevenueCat)
  purchases_flutter: ^8.7.0

  # URL Launcher
  url_launcher: ^6.2.5

  # Ads (Google AdMob)
  google_mobile_ads: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "logo.jpeg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
